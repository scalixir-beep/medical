server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Compression ────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_types
        text/plain text/css
        application/javascript application/json
        image/svg+xml font/woff2;
    gzip_min_length 1024;

    # ── Cache long terme pour les assets Vite (noms hachés) ────────
    location ~* \.(js|css|woff2?|png|jpg|svg|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Proxy /api/* → backend Express ────────────────────────────
    # proxy_pass sans slash de fin : le chemin complet (/api/login…)
    # est transmis tel quel à Express, qui gère bien /api/*
    location /api/ {
        proxy_pass         http://api:4000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout    30s;
        proxy_connect_timeout  5s;
    }

    # ── SPA : toutes les routes inconnues → index.html ─────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
